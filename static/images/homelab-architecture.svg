  <text x="16" y="354" fill="#cbd5e1" font-size="11">Internet</text>
  <text x="75" y="354" fill="#f97316" font-size="12">→</text>
  <text x="90" y="354" fill="#cbd5e1" font-size="11">Cloudflare DNS</text>
  <text x="202" y="354" fill="#f97316" font-size="12">→</text>
  <text x="217" y="354" fill="#cbd5e1" font-size="11">Tunnel</text>
  <text x="16" y="374" fill="#f97316" font-size="12">→</text>
  <text x="31" y="374" fill="#cbd5e1" font-size="11">cloudflared pod</text>
  <text x="148" y="374" fill="#f97316" font-size="12">→</text>
  <text x="163" y="374" fill="#cbd5e1" font-size="11">Service</text>
