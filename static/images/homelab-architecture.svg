<svg viewBox="0 0 720 440" xmlns="http://www.w3.org/2000/svg" width="720" height="440"
     style="font-family:'Courier New',Courier,monospace;">

  <!-- Hardware outer box -->
  <rect x="2" y="2" width="716" height="296" rx="10"
