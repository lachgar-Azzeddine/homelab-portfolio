  <line x1="132" y1="192" x2="262" y2="202" stroke="#334155" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="352" y1="156" x2="352" y2="178" stroke="#334155" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="564" y1="156" x2="564" y2="192" stroke="#334155" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="564" y1="192" x2="458" y2="202" stroke="#334155" stroke-width="1" stroke-dasharray="3,2"/>

