  <text x="432" y="354" fill="#3b82f6" font-size="12">→</text>
  <text x="447" y="354" fill="#cbd5e1" font-size="11">Tailscale</text>
  <text x="515" y="354" fill="#3b82f6" font-size="12">→</text>
  <text x="530" y="354" fill="#cbd5e1" font-size="11">LXC router</text>
  <text x="384" y="374" fill="#3b82f6" font-size="12">→</text>
  <text x="399" y="374" fill="#cbd5e1" font-size="11">MetalLB VIP</text>
  <text x="490" y="374" fill="#3b82f6" font-size="12">→</text>
  <text x="505" y="374" fill="#cbd5e1" font-size="11">Istio GW</text>
