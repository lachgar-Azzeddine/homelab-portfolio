baseURL: "https://azzhomelab.tech/"
title: "Azzeddine Lachgar"
pagination:
  pagerSize: 5
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "Azzeddine Lachgar"
  description: "Kuberstronaut & DevOps Engineer building production-grade cloud-native infrastructure from bare metal."
  keywords: [DevOps, Kubernetes, Cloud Native, Homelab, CNCF, Security, GitOps]
  author: "Azzeddine Lachgar"

  defaultTheme: dark
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  profileMode:
    enabled: true
    title: "Azzeddine Lachgar"
    subtitle: "Kuberstronaut · DevOps Engineer · Casablanca, Morocco"
    imageUrl: "/images/avatar.jpg"
    imageWidth: 160
    imageHeight: 160
    imageTitle: "Azzeddine Lachgar"
    buttons:
      - name: Blog
        url: posts
      - name: Homelab
        url: homelab
      - name: Roadmap
        url: roadmap
      - name: About
        url: about

  socialIcons:
    - name: github
      url: "https://github.com/lachgar-Azzeddine"
    - name: linkedin
      url: "https://www.linkedin.com/in/lachgar-azzeddine"
    - name: rss
      url: "index.xml"

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

  label:
    text: "azzhomelab.tech"

  assets:
    disableHLJS: true

menu:
  main:
    - identifier: blog
      name: Blog
      url: /posts/
      weight: 10
    - identifier: homelab
      name: Homelab
      url: /homelab/
      weight: 20
    - identifier: about
      name: About
      url: /about/
      weight: 30
    - identifier: uses
      name: Uses
      url: /uses/
      weight: 40
    - identifier: roadmap
      name: Roadmap
      url: /roadmap/
      weight: 50

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: false
    style: monokai
