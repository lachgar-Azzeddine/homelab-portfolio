<script src="/js/terminal.js"></script>
<script>
  if (document.getElementById('cs-grid')) {
    var s = document.createElement('script');
    s.src = '/js/cluster-status.js';
    document.body.appendChild(s);
  }
</script>

<button class="terminal-hint" onclick="window.__terminal.open()" title="Open terminal (or press /)">
  &gt;_ terminal
</button>

<div id="served-by" class="served-by" style="display:none">
  <span class="served-by-dot"></span>
  <span id="served-by-text"></span>
</div>

<script>
  fetch('/pod-info.json').then(r => r.json()).then(d => {
    if (!d.pod || !d.node) return;
    const short = d.pod.replace(/^portfolio-/, '').replace(/-[^-]+$/, '…');
    document.getElementById('served-by-text').textContent =
      'served by pod ' + short + ' on ' + d.node;
    document.getElementById('served-by').style.display = 'flex';
  }).catch(() => {});
</script>
